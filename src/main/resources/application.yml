server:
  port: 8080

spring:
  application:
    name: rag-knowledge-base

  ai:
    ollama:
      base-url: http://localhost:11434

  datasource:
    url: jdbc:h2:file:./data/ragdb
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

jwt:
  secret: your-256-bit-secret-key-for-jwt-token-generation-must-be-at-least-32-characters
  expiration: 86400000

logging:
  level:
    com.example.app: DEBUG

---
spring:
  config:
    activate:
      on-profile: pg

  datasource:
    url: jdbc:postgresql://localhost:5432/rag_knowledge_base
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  h2:
    console:
      enabled: false