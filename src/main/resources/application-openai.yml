spring:
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: https://api.siliconflow.cn
      chat:
        options:
          model: deepseek-ai/DeepSeek-V3
      embedding:
        options:
          model: BAAI/bge-m3

  sql:
    init:
      mode: always
      schema-locations: classpath:schema-openai.sql
      continue-on-error: true

  jpa:
    hibernate:
      ddl-auto: update

  h2:
    console:
      enabled: true
      path: /h2-console

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-for-jwt-token-generation-must-be-at-least-32-characters}
  expiration: 86400000