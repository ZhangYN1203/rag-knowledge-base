spring:
  ai:
    ollama:
      base-url: http://ollama:11434

  datasource:
    url: jdbc:postgresql://postgres:5432/example_db
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver

  sql:
    init:
      mode: always
      schema-locations: classpath:schema-postgres.sql
      continue-on-error: true

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  h2:
    console:
      enabled: false

  data:
    redis:
      host: redis
      port: 6379